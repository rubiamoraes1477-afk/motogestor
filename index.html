<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestor PRO - Sistema de Oficina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --navy-blue: #0a192f;
            --orange: #ff8c00;
            --dark-bg: #112240;
            --text-light: #ccd6f6;
            --text-muted: #8892b0;
        }

        body {
            background-color: var(--navy-blue);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background-color: var(--dark-bg);
            border-bottom: 2px solid var(--orange);
        }

        .navbar-brand {
            color: var(--orange) !important;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .nav-link {
            color: var(--text-light) !important;
            transition: color 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--orange) !important;
        }

        .card {
            background-color: var(--dark-bg);
            border: 1px solid rgba(255, 140, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .card-header {
            background-color: rgba(255, 140, 0, 0.1);
            border-bottom: 1px solid var(--orange);
            color: var(--orange);
            font-weight: bold;
        }

        .form-control, .form-select {
            background-color: var(--navy-blue);
            border: 1px solid var(--text-muted);
            color: var(--text-light);
        }

        .form-control:focus, .form-select:focus {
            background-color: var(--navy-blue);
            border-color: var(--orange);
            color: var(--text-light);
            box-shadow: 0 0 0 0.25rem rgba(255, 140, 0, 0.25);
        }

        .btn-primary {
            background-color: var(--orange);
            border-color: var(--orange);
            color: var(--navy-blue);
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #e67e00;
            border-color: #e67e00;
            color: var(--navy-blue);
        }

        .btn-outline-orange {
            color: var(--orange);
            border-color: var(--orange);
        }

        .btn-outline-orange:hover {
            background-color: var(--orange);
            color: var(--navy-blue);
        }

        .table {
            color: var(--text-light);
        }

        .table thead th {
            border-bottom: 2px solid var(--orange);
            color: var(--orange);
        }

        .table tbody tr {
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
        }

        .table-hover tbody tr:hover {
            background-color: rgba(255, 140, 0, 0.05);
            color: var(--text-light);
        }

        .search-bar {
            margin-bottom: 20px;
        }

        .tab-content {
            padding: 20px 0;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner-border {
            color: var(--orange);
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border" role="status">
        <span class="visually-hidden">Carregando...</span>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-motorcycle me-2"></i>MotoGestor PRO</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#clientes" data-bs-toggle="tab">Clientes</a></li>
                <li class="nav-item"><a class="nav-link" href="#servicos" data-bs-toggle="tab">Serviços</a></li>
                <li class="nav-item"><a class="nav-link" href="#financeiro" data-bs-toggle="tab">Financeiro</a></li>
                <li class="nav-item"><a class="nav-link" href="#lista" data-bs-toggle="tab" onclick="loadClientsList()">Lista</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="tab-content">
        <!-- Aba Clientes -->
        <div class="tab-pane fade show active" id="clientes">
            <div class="card">
                <div class="card-header">Cadastrar Novo Cliente</div>
                <div class="card-body">
                    <form id="clientForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="clientName" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Telefone (WhatsApp)</label>
                                <input type="tel" class="form-control" id="clientPhone" placeholder="Ex: 81988887777" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="clientEmail">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Endereço</label>
                                <input type="text" class="form-control" id="clientAddress">
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100">Salvar Cliente</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Aba Serviços -->
        <div class="tab-pane fade" id="servicos">
            <div class="card">
                <div class="card-header">Registrar Novo Serviço</div>
                <div class="card-body">
                    <form id="serviceForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Cliente</label>
                                <select class="form-select" id="serviceClient" required>
                                    <option value="">Selecione um cliente...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Valor (R$)</label>
                                <input type="number" step="0.01" class="form-control" id="serviceValue" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Descrição do Serviço</label>
                                <textarea class="form-control" id="serviceDescription" rows="3" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Status</label>
                                <select class="form-select" id="serviceStatus">
                                    <option value="Pendente">Pendente</option>
                                    <option value="Em Andamento">Em Andamento</option>
                                    <option value="Concluído">Concluído</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Observações</label>
                                <input type="text" class="form-control" id="serviceNotes">
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100">Registrar Serviço</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Aba Financeiro -->
        <div class="tab-pane fade" id="financeiro">
            <div class="card">
                <div class="card-header">Lançamento Financeiro</div>
                <div class="card-body">
                    <form id="financialForm">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Tipo</label>
                                <select class="form-select" id="finType" required>
                                    <option value="Receita">Receita</option>
                                    <option value="Despesa">Despesa</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Valor (R$)</label>
                                <input type="number" step="0.01" class="form-control" id="finValue" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Categoria</label>
                                <input type="text" class="form-control" id="finCategory" placeholder="Ex: Peças, Mão de Obra">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Descrição</label>
                                <input type="text" class="form-control" id="finDescription" required>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100">Salvar Lançamento</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Aba Lista -->
        <div class="tab-pane fade" id="lista">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Lista de Clientes Cadastrados</span>
                    <button class="btn btn-sm btn-outline-orange" onclick="loadClientsList()"><i class="fas fa-sync-alt"></i> Atualizar</button>
                </div>
                <div class="card-body">
                    <div class="search-bar">
                        <div class="input-group">
                            <span class="input-group-text bg-navy-blue border-muted text-orange"><i class="fas fa-search"></i></span>
                            <input type="text" class="form-control" id="searchClient" placeholder="Pesquisar por nome ou telefone..." onkeyup="filterClients()">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Telefone</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="clientsTableBody">
                                <!-- Dados serão carregados aqui -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzQPzBm8FoG4J7b-j5EH9jqCamMk1_yJBVl9F8tNTvnf9if6xvj2vTiRC6HM5WYlfVFpQ/exec';
    let allClients = [];

    // Mostrar/Ocultar Loading
    function toggleLoading(show) {
        document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
    }

    // Enviar dados para a API
    async function postData(action, data) {
        toggleLoading(true);
        try {
            const response = await fetch(`${API_URL}?action=${action}`, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            const result = await response.json();
            toggleLoading(false);
            return result;
        } catch (error) {
            console.error('Erro:', error);
            toggleLoading(false);
            alert('Erro ao salvar dados. Verifique sua conexão.');
            return { status: 'error' };
        }
    }

    // Buscar dados da API
    async function getData(action) {
        toggleLoading(true);
        try {
            const response = await fetch(`${API_URL}?action=${action}`);
            const result = await response.json();
            toggleLoading(false);
            return result;
        } catch (error) {
            console.error('Erro:', error);
            toggleLoading(false);
            return { status: 'error', data: [] };
        }
    }

    // Cadastro de Cliente
    document.getElementById('clientForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const clientData = {
            Nome: document.getElementById('clientName').value,
            Telefone: document.getElementById('clientPhone').value,
            Email: document.getElementById('clientEmail').value,
            Endereco: document.getElementById('clientAddress').value
        };

        const result = await postData('addClient', clientData);
        if (result.status === 'success') {
            alert('Cliente cadastrado com sucesso!');
            const msg = encodeURIComponent(`Olá ${clientData.Nome}, seu cadastro na MotoGestor PRO foi realizado com sucesso!`);
            window.open(`https://wa.me/55${clientData.Telefone.replace(/\D/g, '')}?text=${msg}`, '_blank');
            document.getElementById('clientForm').reset();
            updateClientSelects();
        }
    });

    // Registro de Serviço
    document.getElementById('serviceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const serviceData = {
            IDCliente: document.getElementById('serviceClient').value,
            Valor: document.getElementById('serviceValue').value,
            Descricao: document.getElementById('serviceDescription').value,
            Status: document.getElementById('serviceStatus').value,
            Observacoes: document.getElementById('serviceNotes').value
        };

        const result = await postData('addService', serviceData);
        if (result.status === 'success') {
            alert('Serviço registrado com sucesso!');
            const client = allClients.find(c => c.ID === serviceData.IDCliente);
            if (client) {
                const msg = encodeURIComponent(`Olá ${client.Nome}, o serviço "${serviceData.Descricao}" foi registrado na MotoGestor PRO. Status: ${serviceData.Status}. Valor: R$ ${serviceData.Valor}`);
                window.open(`https://wa.me/55${client.Telefone.replace(/\D/g, '')}?text=${msg}`, '_blank');
            }
            document.getElementById('serviceForm').reset();
        }
    });

    // Lançamento Financeiro
    document.getElementById('financialForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const finData = {
            Tipo: document.getElementById('finType').value,
            Valor: document.getElementById('finValue').value,
            Categoria: document.getElementById('finCategory').value,
            Descricao: document.getElementById('finDescription').value
        };

        const result = await postData('addFinancial', finData);
        if (result.status === 'success') {
            alert('Lançamento financeiro salvo!');
            document.getElementById('financialForm').reset();
        }
    });

    // Carregar Lista de Clientes
    async function loadClientsList() {
        const result = await getData('getClients');
        if (result.status === 'success') {
            allClients = result.data;
            renderClientsTable(allClients);
            updateClientSelects();
        }
    }

    // Renderizar Tabela de Clientes
    function renderClientsTable(clients) {
        const tbody = document.getElementById('clientsTableBody');
        tbody.innerHTML = '';
        clients.forEach(client => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${client.Nome}</td>
                <td>${client.Telefone}</td>
                <td>
                    <button class="btn btn-sm btn-success me-1" onclick="contactWhatsApp('${client.Telefone}', '${client.Nome}')"><i class="fab fa-whatsapp"></i></button>
                    <a href="tel:${client.Telefone.replace(/\D/g, '')}" class="btn btn-sm btn-primary"><i class="fas fa-phone"></i></a>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Filtrar Clientes na Barra de Pesquisa
    function filterClients() {
        const searchTerm = document.getElementById('searchClient').value.toLowerCase();
        const filtered = allClients.filter(client => 
            client.Nome.toLowerCase().includes(searchTerm) || 
            client.Telefone.includes(searchTerm)
        );
        renderClientsTable(filtered);
    }

    // Atualizar Selects de Clientes
    function updateClientSelects() {
        const select = document.getElementById('serviceClient');
        const currentValue = select.value;
        select.innerHTML = '<option value="">Selecione um cliente...</option>';
        allClients.forEach(client => {
            const option = document.createElement('option');
            option.value = client.ID;
            option.textContent = client.Nome;
            select.appendChild(option);
        });
        select.value = currentValue;
    }

    // Função para Chamar no WhatsApp
    function contactWhatsApp(phone, name) {
        const msg = encodeURIComponent(`Olá ${name}, tudo bem? Aqui é da MotoGestor PRO.`);
        window.open(`https://wa.me/55${phone.replace(/\D/g, '')}?text=${msg}`, '_blank');
    }

    // Inicialização
    window.onload = () => {
        loadClientsList();
    };
</script>

</body>
</html>
