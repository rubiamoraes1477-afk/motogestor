<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestor PRO - Sistema de Oficina</title>
    
    <!-- Configuração de Ícones para Celular com Versionamento para Forçar Atualização -->
    <link rel="icon" type="image/png" href="logo.png?v=1">
    <link rel="apple-touch-icon" href="logo.png?v=1">
    <meta name="apple-mobile-web-app-title" content="MotoGestor PRO">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --navy-blue: #0a192f;
            --orange: #ff8c00;
            --dark-bg: #112240;
            --text-light: #ccd6f6;
            --text-muted: #8892b0;
            --success-green: #25D366; /* Verde oficial do WhatsApp */
            --success-dark: #128C7E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background-color: var(--navy-blue);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Logo Centralizada no Topo */
        .header-logo {
            text-align: center;
            padding: 20px 0;
            background-color: var(--dark-bg);
            border-bottom: 1px solid rgba(255, 140, 0, 0.2);
        }

        .header-logo img {
            max-width: 150px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .navbar {
            background-color: var(--dark-bg);
            border-bottom: 3px solid var(--orange);
            padding: 0.5rem 0;
            flex-shrink: 0;
        }

        .navbar-brand {
            color: var(--orange) !important;
            font-weight: bold;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link {
            color: var(--text-light) !important;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem !important;
            border-radius: 5px;
            margin: 0 2px;
        }

        .nav-link:hover {
            color: var(--orange) !important;
            background-color: rgba(255, 140, 0, 0.1);
        }

        .nav-link.active {
            color: var(--navy-blue) !important;
            background-color: var(--orange);
        }

        .container-main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem;
        }

        .card {
            background-color: var(--dark-bg);
            border: 2px solid rgba(255, 140, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.15) 0%, rgba(255, 140, 0, 0.05) 100%);
            border-bottom: 2px solid var(--orange);
            color: var(--orange);
            font-weight: bold;
            font-size: 1.2rem;
            padding: 1rem 1.5rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        /* Labels em Laranja e Negrito */
        .form-label {
            color: var(--orange);
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control, .form-select {
            background-color: var(--navy-blue);
            border: 2px solid var(--text-muted);
            color: var(--text-light);
            font-size: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background-color: var(--navy-blue);
            border-color: var(--orange);
            color: var(--text-light);
            box-shadow: 0 0 0 0.25rem rgba(255, 140, 0, 0.25);
            outline: none;
        }

        .btn-primary {
            background-color: var(--orange);
            border-color: var(--orange);
            color: var(--navy-blue);
            font-weight: bold;
            font-size: 1.1rem;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background-color: #e67e00;
            border-color: #e67e00;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.4);
        }

        /* Botão WhatsApp Grande e Verde */
        .btn-whatsapp-big {
            background-color: var(--success-green);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp-big:hover {
            background-color: var(--success-dark);
            transform: scale(1.02);
            color: white;
        }

        .btn-whatsapp-disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-whatsapp-disabled:hover {
            background-color: #555;
            transform: none;
        }

        .table {
            color: var(--text-light);
        }

        .table thead th {
            border-bottom: 2px solid var(--orange);
            color: var(--orange);
            font-weight: bold;
            text-transform: uppercase;
        }

        .table tbody td {
            border-bottom: 1px solid rgba(255, 140, 0, 0.1);
            vertical-align: middle;
            padding: 15px 10px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.9);
            display: none;
            justify-content: center; align-items: center;
            z-index: 9999;
        }

        .spinner-border { color: var(--orange); width: 3rem; height: 3rem; }

        .financial-summary {
            background: rgba(255, 140, 0, 0.1);
            border: 2px solid var(--orange);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .financial-summary h3 { color: var(--orange); font-size: 1rem; text-transform: uppercase; margin-bottom: 0.5rem; }
        .financial-summary .amount { font-size: 2rem; font-weight: bold; }
        .financial-summary .amount.positive { color: #28a745; }

        @media (max-width: 768px) {
            .navbar-brand span { font-size: 1.1rem; }
            .nav-link { font-size: 0.85rem; padding: 0.5rem 0.5rem !important; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border" role="status"></div>
</div>

<!-- Logo no Topo -->
<div class="header-logo">
    <img src="logo.png?v=1" alt="MotoGestor PRO Logo">
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid px-3">
        <a class="navbar-brand" href="#">
            <i class="fas fa-motorcycle"></i>
            <span>MotoGestor PRO</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#" data-tab="clientes" onclick="switchTab('clientes', event)">CLIENTES</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-tab="servicos" onclick="switchTab('servicos', event)">SERVIÇOS</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-tab="financeiro" onclick="switchTab('financeiro', event)">FINANCEIRO</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-tab="lista" onclick="switchTab('lista', event); loadClientsList();">LISTA</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-main">
    <div class="container-fluid">

        <!-- TAB: CLIENTES -->
        <div id="clientes" class="tab-content active">
            <div class="card">
                <div class="card-header"><i class="fas fa-user-plus me-2"></i>CADASTRAR CLIENTE</div>
                <div class="card-body">
                    <form id="clientForm">
                        <div class="form-group">
                            <label class="form-label">NOME COMPLETO</label>
                            <input type="text" class="form-control" id="clientName" placeholder="Digite o nome do cliente" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">WHATSAPP (COM DDD)</label>
                            <input type="tel" class="form-control" id="clientPhone" placeholder="Ex: 81988887777" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">E-MAIL</label>
                            <input type="email" class="form-control" id="clientEmail" placeholder="cliente@email.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">ENDEREÇO</label>
                            <input type="text" class="form-control" id="clientAddress" placeholder="Rua, Número, Bairro">
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-2"></i>SALVAR CLIENTE</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- TAB: SERVIÇOS -->
        <div id="servicos" class="tab-content">
            <div class="card">
                <div class="card-header"><i class="fas fa-tools me-2"></i>REGISTRAR SERVIÇO</div>
                <div class="card-body">
                    <form id="serviceForm">
                        <div class="form-group">
                            <label class="form-label">SELECIONE O CLIENTE</label>
                            <select class="form-select" id="serviceClient" required>
                                <option value="">Carregando clientes...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">MODELO DA MOTO</label>
                            <input type="text" class="form-control" id="serviceModel" placeholder="Ex: Honda CG 160" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">PLACA</label>
                            <input type="text" class="form-control" id="servicePlate" placeholder="Ex: ABC-1234" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">VALOR DO SERVIÇO (R$)</label>
                            <input type="number" step="0.01" class="form-control" id="serviceValue" placeholder="0,00" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">DESCRIÇÃO DO PROBLEMA / SERVIÇO</label>
                            <textarea class="form-control" id="serviceDescription" rows="3" placeholder="O que precisa ser feito?" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-check me-2"></i>REGISTRAR SERVIÇO</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- TAB: FINANCEIRO -->
        <div id="financeiro" class="tab-content">
            <div class="card">
                <div class="card-header"><i class="fas fa-cash-register me-2"></i>FINANCEIRO</div>
                <div class="card-body">
                    <div class="financial-summary">
                        <h3>TOTAL RECEBIDO HOJE</h3>
                        <div class="amount positive" id="dailyTotal">R$ 0,00</div>
                    </div>
                    <form id="financialForm">
                        <div class="form-group">
                            <label class="form-label">TIPO DE LANÇAMENTO</label>
                            <select class="form-select" id="finType" required>
                                <option value="Receita">RECEITA (ENTRADA)</option>
                                <option value="Despesa">DESPESA (SAÍDA)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">VALOR (R$)</label>
                            <input type="number" step="0.01" class="form-control" id="finValue" placeholder="0,00" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">DESCRIÇÃO</label>
                            <input type="text" class="form-control" id="finDescription" placeholder="Ex: Pagamento troca de óleo" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-plus me-2"></i>LANÇAR PAGAMENTO</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- TAB: LISTA -->
        <div id="lista" class="tab-content">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-list me-2"></i>LISTA DE CLIENTES E SERVIÇOS</span>
                    <button class="btn btn-sm btn-outline-orange" onclick="loadClientsList()"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div class="card-body">
                    <div class="input-group mb-3">
                        <span class="input-group-text bg-dark border-secondary text-orange"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" id="searchClient" placeholder="Buscar por nome ou telefone..." onkeyup="filterClients()">
                    </div>
                    <div id="clientsListContainer">
                        <!-- Dados via JS -->
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzQPzBm8FoG4J7b-j5EH9jqCamMk1_yJBVl9F8tNTvnf9if6xvj2vTiRC6HM5WYlfVFpQ/exec';
    let allClients = [];
    let allServices = [];

    function switchTab(tabName, event) {
        if(event) event.preventDefault();
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
    }

    function toggleLoading(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }

    async function postData(action, data) {
        toggleLoading(true);
        try {
            const response = await fetch(`${API_URL}?action=${action}`, { method: 'POST', body: JSON.stringify(data) });
            const result = await response.json();
            toggleLoading(false);
            return result;
        } catch (e) { toggleLoading(false); alert('Erro na conexão!'); return {status:'error'}; }
    }

    async function getData(action) {
        toggleLoading(true);
        try {
            const response = await fetch(`${API_URL}?action=${action}`);
            const result = await response.json();
            toggleLoading(false);
            return result;
        } catch (e) { toggleLoading(false); return {status:'error', data:[]}; }
    }

    document.getElementById('clientForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            Nome: document.getElementById('clientName').value,
            Telefone: document.getElementById('clientPhone').value,
            Email: document.getElementById('clientEmail').value,
            Endereco: document.getElementById('clientAddress').value
        };
        const res = await postData('addClient', data);
        if(res.status === 'success') {
            alert('Cliente salvo!');
            if (data.Telefone) {
                const msg = encodeURIComponent(`Olá ${data.Nome}, seu cadastro na MotoGestor PRO foi concluído!`);
                window.open(`https://wa.me/55${data.Telefone.replace(/\D/g,'')}?text=${msg}`, '_blank');
            }
            document.getElementById('clientForm').reset();
            loadClientsList();
        }
    });

    document.getElementById('serviceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const clientID = document.getElementById('serviceClient').value;
        const data = {
            IDCliente: clientID,
            Descricao: document.getElementById('serviceDescription').value,
            Valor: document.getElementById('serviceValue').value,
            Status: 'Pendente',
            Observacoes: `Moto: ${document.getElementById('serviceModel').value} | Placa: ${document.getElementById('servicePlate').value}`
        };
        const res = await postData('addService', data);
        if(res.status === 'success') {
            alert('Serviço registrado!');
            const client = allClients.find(c => c.ID === clientID);
            if(client && client.Telefone) {
                const msg = encodeURIComponent(`Olá ${client.Nome}, registramos o serviço para sua moto ${document.getElementById('serviceModel').value}. Valor: R$ ${data.Valor}.`);
                window.open(`https://wa.me/55${client.Telefone.replace(/\D/g,'')}?text=${msg}`, '_blank');
            }
            document.getElementById('serviceForm').reset();
        }
    });

    document.getElementById('financialForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            Tipo: document.getElementById('finType').value,
            Valor: document.getElementById('finValue').value,
            Descricao: document.getElementById('finDescription').value
        };
        const res = await postData('addFinancial', data);
        if(res.status === 'success') {
            alert('Lançamento realizado!');
            document.getElementById('financialForm').reset();
            updateDailyTotal();
        }
    });

    async function loadClientsList() {
        const resClients = await getData('getClients');
        const resServices = await getData('getServices');
        
        if(resClients.status === 'success') {
            allClients = resClients.data;
            allServices = resServices.status === 'success' ? resServices.data : [];
            renderList(allClients);
            updateSelects();
        }
    }

    function renderList(clients) {
        const container = document.getElementById('clientsListContainer');
        if (clients.length === 0) {
            container.innerHTML = '<p class="text-center text-muted">Nenhum cliente encontrado.</p>';
            return;
        }

        container.innerHTML = clients.map(c => {
            // Busca o último serviço deste cliente
            const clientServices = allServices.filter(s => s.IDCliente == c.ID);
            const lastService = clientServices.length > 0 ? clientServices[clientServices.length - 1] : null;
            
            let serviceInfo = '<span class="text-muted">Nenhum serviço registrado</span>';
            let waAvisoBtn = '';

            if (lastService) {
                serviceInfo = `
                    <div class="mt-2 p-2 rounded" style="background: rgba(255,255,255,0.05); border-left: 3px solid var(--orange);">
                        <small class="d-block text-orange">ÚLTIMO SERVIÇO:</small>
                        <strong>${lastService.Observacoes || 'Moto não informada'}</strong><br>
                        <small>${lastService.Descricao}</small><br>
                        <span class="badge bg-warning text-dark mt-1">${lastService.Status}</span>
                    </div>
                `;

                // Lógica do Botão de Aviso WhatsApp
                if (c.Telefone && c.Telefone.trim() !== "") {
                    waAvisoBtn = `
                        <button class="btn btn-whatsapp-big" onclick="sendServiceNotice('${c.Telefone}', '${c.Nome}', '${lastService.Observacoes}', '${lastService.Status}')">
                            <i class="fab fa-whatsapp"></i> ENVIAR AVISO WHATSAPP
                        </button>
                    `;
                } else {
                    waAvisoBtn = `
                        <button class="btn btn-whatsapp-big btn-whatsapp-disabled" onclick="alert('Por favor, cadastre o número de telefone do cliente primeiro!')">
                            <i class="fas fa-exclamation-triangle"></i> CADASTRAR TELEFONE PRIMEIRO
                        </button>
                    `;
                }
            }

            return `
                <div class="card mb-3" style="border-width: 1px;">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="mb-0 text-orange">${c.Nome}</h5>
                                <small class="text-muted">${c.Telefone || 'Sem telefone'}</small>
                            </div>
                            <div class="d-flex gap-2">
                                ${c.Telefone ? `<a href="tel:${c.Telefone.replace(/\D/g,'')}" class="btn btn-sm btn-outline-light"><i class="fas fa-phone"></i></a>` : ''}
                                ${c.Telefone ? `<button class="btn btn-sm btn-success" onclick="contactWA('${c.Telefone}', '${c.Nome}')"><i class="fab fa-whatsapp"></i></button>` : ''}
                            </div>
                        </div>
                        ${serviceInfo}
                        ${waAvisoBtn}
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterClients() {
        const term = document.getElementById('searchClient').value.toLowerCase();
        renderList(allClients.filter(c => c.Nome.toLowerCase().includes(term) || (c.Telefone && c.Telefone.includes(term))));
    }

    function updateSelects() {
        const s = document.getElementById('serviceClient');
        s.innerHTML = '<option value="">SELECIONE O CLIENTE</option>' + allClients.map(c => `<option value="${c.ID}">${c.Nome}</option>`).join('');
    }

    function contactWA(p, n) {
        if (!p) return alert('Telefone não cadastrado!');
        window.open(`https://wa.me/55${p.replace(/\D/g,'')}?text=${encodeURIComponent('Olá '+n+', tudo bem?')}`, '_blank');
    }

    function sendServiceNotice(phone, name, details, status) {
        if (!phone) return alert('Telefone não cadastrado!');
        const msg = `Olá *${name}*! 🛠️\n\nPassando para informar sobre o serviço da sua moto:\n\n📍 *Detalhes:* ${details}\n📊 *Status Atual:* ${status}\n\nQualquer dúvida, estamos à disposição! 🏍️💨`;
        window.open(`https://wa.me/55${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    async function updateDailyTotal() {
        const res = await getData('getFinancial');
        if(res.status === 'success') {
            const today = new Date().toLocaleDateString('pt-BR');
            let total = 0;
            res.data.forEach(t => { if(t.Data === today && t.Tipo === 'Receita') total += parseFloat(t.Valor); });
            document.getElementById('dailyTotal').textContent = `R$ ${total.toFixed(2).replace('.',',')}`;
        }
    }

    window.onload = () => { loadClientsList(); updateDailyTotal(); };
</script>
</body>
</html>
