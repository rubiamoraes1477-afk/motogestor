<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGestor PRO - Sistema de Oficina</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff8c00">
    
    <link rel="icon" type="image/png" href="logo.png?v=1">
    <link rel="apple-touch-icon" href="logo.png?v=1">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy-blue: #0a192f; --orange: #ff8c00; --dark-bg: #112240; --text-light: #ccd6f6; --success-green: #25D366; }
        html, body { height: 100%; background-color: var(--navy-blue); color: var(--text-light); font-family: sans-serif; }
        body { display: flex; flex-direction: column; }
        .header-logo { text-align: center; padding: 20px 0; background-color: var(--dark-bg); border-bottom: 1px solid rgba(255, 140, 0, 0.2); }
        .header-logo img { max-width: 120px; border-radius: 10px; }
        .navbar { background-color: var(--dark-bg); border-bottom: 3px solid var(--orange); }
        .nav-link { color: var(--text-light) !important; font-weight: bold; }
        .nav-link.active { color: var(--navy-blue) !important; background-color: var(--orange); border-radius: 5px; }
        .card { background-color: var(--dark-bg); border: 1px solid var(--orange); border-radius: 12px; margin-bottom: 1rem; }
        .card-header { color: var(--orange); font-weight: bold; }
        .form-label { color: var(--orange); font-weight: bold; font-size: 0.8rem; }
        .form-control, .form-select { background-color: var(--navy-blue); border: 1px solid #333; color: white; }
        .btn-primary { background-color: var(--orange); border: none; color: var(--navy-blue); font-weight: bold; }
        .btn-whatsapp-big { background-color: var(--success-green); color: white; width: 100%; border-radius: 8px; padding: 10px; font-weight: bold; border: none; margin-top: 10px; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner-border text-warning"></div></div>

<div class="header-logo"><img src="logo.png?v=1"></div>

<nav class="navbar navbar-expand navbar-dark sticky-top">
    <div class="container-fluid">
        <ul class="navbar-nav w-100 justify-content-around">
            <li class="nav-item"><a class="nav-link active" href="#" onclick="switchTab('clientes', event)">CLIENTES</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('servicos', event)">SERVIÇOS</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('lista', event)">LISTA</a></li>
        </ul>
    </div>
</nav>

<div class="container-main">
    <div id="clientes" class="tab-content active">
        <div class="card">
            <div class="card-header">NOVO CLIENTE</div>
            <div class="card-body">
                <form id="clientForm">
                    <label class="form-label">NOME COMPLETO</label>
                    <input type="text" class="form-control mb-2" id="Nome_Completo" required>
                    <label class="form-label">WHATSAPP (DDD + NÚMERO)</label>
                    <input type="tel" class="form-control mb-2" id="WhatsApp_DDD" placeholder="Ex: 81988887777" required>
                    <label class="form-label">CIDADE</label>
                    <input type="text" class="form-control mb-2" id="Cidade">
                    <label class="form-label">ENDEREÇO</label>
                    <input type="text" class="form-control mb-3" id="Endereço">
                    <button type="submit" class="btn btn-primary w-100">SALVAR CLIENTE</button>
                </form>
            </div>
        </div>
    </div>

    <div id="servicos" class="tab-content">
        <div class="card">
            <div class="card-header">REGISTRAR SERVIÇO</div>
            <div class="card-body">
                <form id="serviceForm">
                    <label class="form-label">CLIENTE</label>
                    <select class="form-select mb-2" id="ID_Cliente" required><option value="">Carregando...</option></select>
                    <label class="form-label">PLACA DA MOTO</label>
                    <input type="text" class="form-control mb-2" id="Placa_Veiculo" required>
                    <label class="form-label">MODELO / ANO</label>
                    <input type="text" class="form-control mb-2" id="Modelo_Ano" required>
                    <label class="form-label">PROBLEMA / SERVIÇO</label>
                    <textarea class="form-control mb-2" id="Problema_Relatado" required></textarea>
                    <label class="form-label">VALOR (R$)</label>
                    <input type="number" step="0.01" class="form-control mb-3" id="Valor_Total" required>
                    <button type="submit" class="btn btn-primary w-100">FINALIZAR E AVISAR</button>
                </form>
            </div>
        </div>
    </div>

    <div id="lista" class="tab-content">
        <div class="input-group mb-3">
            <input type="text" class="form-control" id="searchClient" placeholder="Buscar cliente..." onkeyup="filterClients()">
        </div>
        <div id="clientsListContainer"></div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxrrvKXAEN5sSZYhOpEqLdoy0i2VzfTqzsJ-MP4OA3DjJmkkrUO4CisBIxzhH--PnqmeA/exec';
    let allClients = [];
    let allServices = [];

    function switchTab(tab, e) {
        e.preventDefault();
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        e.target.classList.add('active');
        if(tab === 'lista') loadData();
    }

    async function loadData() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const rC = await fetch(`${API_URL}?action=getClients`);
            const dC = await rC.json();
            allClients = dC.data;

            const rS = await fetch(`${API_URL}?action=getServices`);
            const dS = await rS.json();
            allServices = dS.data;

            updateSelects();
            renderList(allClients);
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    function updateSelects() {
        const sel = document.getElementById('ID_Cliente');
        sel.innerHTML = '<option value="">SELECIONE</option>' + allClients.map(c => `<option value="${c.ID_Cliente}">${c.Nome_Completo}</option>`).join('');
    }

    document.getElementById('clientForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            Nome_Completo: document.getElementById('Nome_Completo').value,
            WhatsApp_DDD: document.getElementById('WhatsApp_DDD').value,
            Cidade: document.getElementById('Cidade').value,
            Endereço: document.getElementById('Endereço').value,
            ID_Cliente: Date.now() // Gera um ID único simples
        };
        
        await fetch(API_URL + '?action=addClient', { method: 'POST', body: JSON.stringify(data) });
        alert('Cliente Salvo!');
        document.getElementById('clientForm').reset();
    });

    document.getElementById('serviceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            ID_Cliente: document.getElementById('ID_Cliente').value,
            Placa_Veiculo: document.getElementById('Placa_Veiculo').value,
            Modelo_Ano: document.getElementById('Modelo_Ano').value,
            Problema_Relatado: document.getElementById('Problema_Relatado').value,
            Valor_Total: document.getElementById('Valor_Total').value,
            Status: 'Pendente'
        };

        await fetch(API_URL + '?action=addService', { method: 'POST', body: JSON.stringify(data) });
        
        const client = allClients.find(c => c.ID_Cliente == data.ID_Cliente);
        const msg = encodeURIComponent(`Olá ${client.Nome_Completo}! Serviço registrado: ${data.Problema_Relatado}. Valor: R$ ${data.Valor_Total}`);
        window.open(`https://wa.me/55${client.WhatsApp_DDD.replace(/\D/g,'')}?text=${msg}`);
        
        document.getElementById('serviceForm').reset();
    });

    function renderList(list) {
        const container = document.getElementById('clientsListContainer');
        container.innerHTML = list.map(c => `
            <div class="card p-3">
                <div class="text-orange fw-bold">${c.Nome_Completo}</div>
                <div class="small">${c.WhatsApp_DDD}</div>
                <button class="btn-whatsapp-big" onclick="window.open('https://wa.me/55${c.WhatsApp_DDD.replace(/\D/g,'')}')">
                    <i class="fab fa-whatsapp"></i> CONVERSAR
                </button>
            </div>
        `).join('');
    }

    function filterClients() {
        const val = document.getElementById('searchClient').value.toLowerCase();
        renderList(allClients.filter(c => c.Nome_Completo.toLowerCase().includes(val)));
    }

    window.onload = loadData;
</script>
</body>
</html>
